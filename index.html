<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Практическая работа №7 — События в JS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Приветственный баннер -->
    <div id="welcome-banner" class="welcome-banner">
      <p>
        👋 Добро пожаловать! Это практическая работа по событиям в JS. Удачи!
      </p>
      <button id="close-banner-btn" type="button">✕ Закрыть</button>
    </div>

    <header>
      <h1>Практическая работа №7: События в JS</h1>
      <p class="subtitle">
        Обработчики событий, всплытие и погружение, делегирование
      </p>
    </header>

    <main>
      <!-- Форма добавления -->
      <section class="card" id="form-section">
        <h2>Задание 1 — Добавить задачу</h2>
        <div class="form-group">
          <label for="task-input">Текст задачи:</label>
          <!-- ПОЧЕМУ? — Нативное ограничение ввода на уровне HTML-структуры -->
          <input
            type="text"
            id="task-input"
            maxlength="256"
            placeholder="Введите название задачи..."
          />
          <label for="priority-select">Приоритет:</label>
          <select id="priority-select">
            <option value="low">🟢 Низкий</option>
            <option value="medium" selected>🟡 Средний</option>
            <option value="high">🔴 Высокий</option>
          </select>
          <button id="add-task-btn" type="button">＋ Добавить задачу</button>
        </div>
        <p id="validation-msg" class="validation-msg hidden"></p>
      </section>

      <!-- Управление доской -->
      <section class="card" id="controls-section">
        <h2>Управление доской</h2>
        <div class="controls-row">
          <div class="buttons">
            <button id="toggle-theme-btn" type="button">
              🌙 Переключить тему
            </button>
            <button id="clear-done-btn" type="button">
              🗑 Очистить «Готово»
            </button>
            <button id="view-mode-btn" type="button">👁 Режим просмотра</button>
          </div>
          <p class="counter-line">
            Задач на доске: <span id="task-count">0</span>
          </p>
        </div>
      </section>

      <!-- Kanban-доска -->
      <section id="board-section">
        <div id="board">
          <div class="column" data-status="todo">
            <h3 class="column-title">
              📋 К выполнению <span class="column-count">0</span>
            </h3>
            <div class="task-list"></div>
          </div>
          <div class="column" data-status="in-progress">
            <h3 class="column-title">
              ⚙️ В работе <span class="column-count">0</span>
            </h3>
            <div class="task-list"></div>
          </div>
          <div class="column" data-status="done">
            <h3 class="column-title">
              ✅ Готово <span class="column-count">0</span>
            </h3>
            <div class="task-list"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
